# SUBMISSION_CODE_PACKAGE conda environment (hybrid track).
# The reference machine uses two environments; this recipe covers the hybrid
# one (Python 3.11 + FAISS 1.9, used by Results 1, 5, 6).  The native track
# needs Python 3.10 + numpy + pybind11 only — see requirements.txt.
name: toploc-hybrid
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy=1.26.4
  - pandas=3.0.3
  - pyarrow=24.0.0
  - joblib=1.5.3
  - threadpoolctl=3.6.0
  - scikit-learn=1.9.0
  - faiss-cpu=1.9.0
  - pip
